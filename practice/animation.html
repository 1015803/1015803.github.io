<!DOCTYPE>
<html lang ="en">
	<head>
		<title>Animation</title>
	</head>
	<body>
		 <canvas id="myCanvas"
                          width=800
                          height=800>
                 </canvas>
		<script>
			const canvas = document
			.getElementById("myCanvas");
			const ctx = canvas.getContext("2d");
			function animate(){
				ctx.clearRect(0, 0, 800, 800);
				ctx.fillRect(x, 100, 10, 10);
				ctx.fillRect(x, 400, 10, 10);  
				x=x+speed;
				if (x>800) {
					x=0;
				}
				requestAnimationFrame(animate);
			}
			speed=5;
			x=1; 

			animate();
		</script>
	</body>
</html>
